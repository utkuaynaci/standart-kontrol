<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standart Denetleyici</title>
<style>
  :root[data-theme="dark"] {
    --bg: #0f0f0f;
    --topbar: #1a1a1a;
    --topbar-border: #2a2a2a;
    --card: #1a1a1a;
    --card2: #141414;
    --border: #2a2a2a;
    --border2: #222;
    --text: #e5e5e3;
    --text2: #aaa;
    --text3: #666;
    --text4: #555;
    --muted: #333;
    --input-bg: #0f0f0f;
    --hover: #1f1f1f;
    --row-update: #1f0f0f;
    --row-current: #0f1a0f;
    --log-bg: #0a0a0a;
    --badge-pending-bg: #1f1f1f; --badge-pending-c: #555; --badge-pending-b: #2a2a2a;
    --badge-check-bg: #1a1f2e;   --badge-check-c: #3b82f6; --badge-check-b: #1e3a5f;
    --badge-cur-bg: #0f1a0f;     --badge-cur-c: #22c55e;   --badge-cur-b: #1a3a1a;
    --badge-upd-bg: #1f0f0f;     --badge-upd-c: #ef4444;   --badge-upd-b: #3f1f1f;
    --badge-unk-bg: #1f1a0f;     --badge-unk-c: #f59e0b;   --badge-unk-b: #3f2f0f;
    --toggle-bg: #2a2a2a; --toggle-c: #888;
    --dot: #333; --dot-b: #444;
    --line: #2a2a2a;
    --shadow: rgba(0,0,0,0.4);
  }
  :root[data-theme="light"] {
    --bg: #f5f5f3;
    --topbar: #1a1a18;
    --topbar-border: #111;
    --card: #fff;
    --card2: #f8f8f6;
    --border: #e5e5e3;
    --border2: #f0f0ee;
    --text: #1a1a18;
    --text2: #444;
    --text3: #888;
    --text4: #666;
    --muted: #ccc;
    --input-bg: #fff;
    --hover: #fafaf8;
    --row-update: #fff8f8;
    --row-current: #f8fff8;
    --log-bg: #1a1a18;
    --badge-pending-bg: #f5f5f3; --badge-pending-c: #888; --badge-pending-b: #e5e5e3;
    --badge-check-bg: #eff6ff;   --badge-check-c: #3b82f6; --badge-check-b: #bfdbfe;
    --badge-cur-bg: #f0fdf4;     --badge-cur-c: #22c55e;   --badge-cur-b: #bbf7d0;
    --badge-upd-bg: #fef2f2;     --badge-upd-c: #ef4444;   --badge-upd-b: #fca5a5;
    --badge-unk-bg: #fffbeb;     --badge-unk-c: #d97706;   --badge-unk-b: #fde68a;
    --toggle-bg: #f0f0ee; --toggle-c: #666;
    --dot: #d1d5db; --dot-b: #9ca3af;
    --line: #e5e7eb;
    --shadow: rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s, border-color 0.2s; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  .topbar { background: var(--topbar); border-bottom: 1px solid var(--topbar-border); padding: 14px 32px; display: flex; align-items: center; gap: 12px; }
  .topbar-icon { width: 28px; height: 28px; background: #3b82f6; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .topbar h1 { font-size: 15px; font-weight: 500; color: #e5e5e3; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .theme-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--topbar-border); background: var(--toggle-bg); color: var(--toggle-c); font-size: 12px; cursor: pointer; font-family: inherit; }
  .theme-btn:hover { color: var(--text); }
  .logout-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
  .logout-btn:hover { color: #ccc; border-color: #555; }

  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .upload-area { border: 2px dashed var(--border); border-radius: 14px; padding: 48px 60px; text-align: center; cursor: pointer; transition: all 0.2s; width: 100%; max-width: 540px; background: var(--card); }
  .upload-area:hover { border-color: #3b82f6; }
  .upload-area.loaded { border-color: #22c55e; border-style: solid; cursor: default; }
  .upload-area h2 { font-size: 15px; font-weight: 400; color: var(--text3); margin-bottom: 4px; }
  .upload-area p { font-size: 12px; color: var(--text4); }
  #fileInput { display: none; }

  .content-area { width: 100%; max-width: 1100px; }

  .stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--card); border-radius: 10px; padding: 12px 16px; border: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text4); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-value.red { color: #ef4444; }
  .stat-value.green { color: #22c55e; }
  .stat-value.amber { color: #f59e0b; }
  .stat-value.blue { color: #3b82f6; }

  .controls { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  button { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text); transition: all 0.15s; }
  button:hover:not(:disabled) { background: var(--hover); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  button.primary:hover:not(:disabled) { background: #2563eb; border-color: #2563eb; }
  button.danger-btn { color: #ef4444; border-color: var(--badge-upd-b); }
  .filter-btns { display: flex; gap: 5px; margin-left: auto; flex-wrap: wrap; }
  .filter-btn { padding: 5px 11px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text3); cursor: pointer; }
  .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  .progress-wrap { background: var(--border); border-radius: 4px; height: 3px; margin-bottom: 6px; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--text4); margin-bottom: 12px; display: none; }

  .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--card2); padding: 9px 14px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text4); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .03em; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border2); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--hover); }
  tbody tr.row-update { background: var(--row-update); }
  tbody tr.row-current { background: var(--row-current); }

  .std-code { font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; font-weight: 600; color: var(--text); }
  .std-name { font-size: 12px; color: var(--text3); margin-top: 3px; line-height: 1.4; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-pending  { background: var(--badge-pending-bg); color: var(--badge-pending-c); border: 1px solid var(--badge-pending-b); }
  .badge-checking { background: var(--badge-check-bg);   color: var(--badge-check-c);   border: 1px solid var(--badge-check-b); }
  .badge-current  { background: var(--badge-cur-bg);     color: var(--badge-cur-c);     border: 1px solid var(--badge-cur-b); }
  .badge-update   { background: var(--badge-upd-bg);     color: var(--badge-upd-c);     border: 1px solid var(--badge-upd-b); }
  .badge-unknown  { background: var(--badge-unk-bg);     color: var(--badge-unk-c);     border: 1px solid var(--badge-unk-b); }

  .result-box { margin-top: 5px; }
  .result-ver { font-size: 12px; font-weight: 500; margin-bottom: 3px; color: var(--text2); }
  .result-detail { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 4px; max-width: 400px; }
  .history-wrap { margin-top: 5px; }
  .history-title { font-size: 10px; font-weight: 500; color: var(--text4); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em; }
  .history-timeline { display: flex; flex-wrap: wrap; align-items: center; }
  .history-ver { display: inline-flex; flex-direction: column; align-items: center; }
  .history-dot-wrap { display: flex; align-items: center; }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot); border: 2px solid var(--dot-b); flex-shrink: 0; }
  .history-dot.latest { background: #3b82f6; border-color: #2563eb; }
  .history-dot.ours   { background: #f59e0b; border-color: #d97706; }
  .history-line { width: 16px; height: 2px; background: var(--line); }
  .history-label { font-size: 10px; color: var(--text4); margin-top: 2px; white-space: nowrap; }
  .history-label.bold { color: var(--text2); font-weight: 600; }
  .result-link { font-size: 12px; color: #3b82f6; text-decoration: none; display: inline-block; margin-top: 3px; }
  .result-link:hover { text-decoration: underline; }

  .log-box { background: var(--log-bg); color: var(--text4); font-family: monospace; font-size: 12px; padding: 12px 16px; border-radius: 8px; margin-top: 12px; max-height: 130px; overflow-y: auto; display: none; line-height: 1.9; border: 1px solid var(--border); }
  .log-box .ok   { color: #22c55e; }
  .log-box .warn { color: #f59e0b; }
  .log-box .err  { color: #ef4444; }
  .log-box .info { color: #3b82f6; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 18px; border-radius: 10px; font-size: 13px; display: none; z-index: 200; box-shadow: 0 8px 24px var(--shadow); }

  @media (max-width:700px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .controls { flex-direction: column; align-items: stretch; }
    .filter-btns { margin-left: 0; }
    .upload-area { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">📋</div>
  <h1>Standart Denetleyici</h1>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Açık</button>
    <button class="logout-btn" onclick="window.location='/logout'">Çıkış</button>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="uploadFile(event)">
    <h2>Excel dosyanızı buraya sürükleyin veya tıklayın</h2>
    <p>.xlsx · .xls · Standart NO sütunu otomatik algılanır</p>
  </div>

  <div class="content-area" id="contentArea" style="display:none; margin-top:24px;">
    <div class="stats">
      <div class="stat"><div class="stat-label">Toplam</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat"><div class="stat-label">Güncelleme Var</div><div class="stat-value red" id="statUpdate">0</div></div>
      <div class="stat"><div class="stat-label">Güncel</div><div class="stat-value green" id="statCurrent">0</div></div>
      <div class="stat"><div class="stat-label">Geçmiş Var</div><div class="stat-value blue" id="statHistory">0</div></div>
      <div class="stat"><div class="stat-label">Bekleyen</div><div class="stat-value amber" id="statPending">0</div></div>
    </div>
    <div class="controls">
      <button class="primary" id="startBtn" onclick="startCheck()">🔍 Tümünü Kontrol Et</button>
      <button id="stopBtn" onclick="stopCheck()" disabled>⏹ Durdur</button>
      <button id="exportBtn" onclick="exportExcel()" disabled>⬇️ Excel'e Aktar</button>
      <button class="danger-btn" onclick="resetAll()">🗑 Sıfırla</button>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('all',this)">Tümü</button>
        <button class="filter-btn" onclick="setFilter('update',this)">Güncelleme Var</button>
        <button class="filter-btn" onclick="setFilter('current',this)">Güncel</button>
        <button class="filter-btn" onclick="setFilter('history',this)">Geçmiş Var</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Bekleyen</button>
      </div>
    </div>
    <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:20%">Standart No</th>
            <th style="width:22%">Standart Adı</th>
            <th style="width:10%">Listedeki Tarih</th>
            <th style="width:48%">Kontrol Sonucu & Versiyon Geçmişi</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Tema
const savedTheme = localStorage.getItem('theme') || 'dark';
setTheme(savedTheme);
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️ Açık' : '🌙 Koyu';
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

let sessionId=null, standards=[], activeFilter='all', running=false, shouldStop=false;

const ua=document.getElementById('uploadArea');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.style.borderColor='#3b82f6';});
ua.addEventListener('dragleave',()=>ua.style.borderColor='');
ua.addEventListener('drop',e=>{e.preventDefault();ua.style.borderColor='';doUpload(e.dataTransfer.files[0]);});
function uploadFile(e){doUpload(e.target.files[0]);}

async function doUpload(file){
  const fd=new FormData(); fd.append('file',file);
  try {
    const res=await fetch('/upload',{method:'POST',body:fd});
    const data=await res.json();
    if(data.error){alert('Hata: '+data.error);return;}
    sessionId=data.session_id; standards=data.standards;
    ua.classList.add('loaded');
    ua.innerHTML=`<h2>${file.name}</h2><p>${standards.length} standart yüklendi</p>`;
    document.getElementById('mainArea').style.justifyContent='flex-start';
    document.getElementById('mainArea').style.paddingTop='28px';
    document.getElementById('contentArea').style.display='block';
    document.getElementById('logBox').style.display='block';
    renderTable(); updateStats();
    toast(`✓ ${standards.length} standart yüklendi`);
  } catch(e){alert('Yükleme hatası: '+e.message);}
}

function buildResultHtml(s){
  const badges={
    pending:'<span class="badge badge-pending">⏳ Bekliyor</span>',
    checking:'<span class="badge badge-checking">🔄 Sorgulanıyor...</span>',
    current:'<span class="badge badge-current">✅ Güncel</span>',
    update:'<span class="badge badge-update">⚠️ Güncelleme Var</span>',
    unknown:'<span class="badge badge-unknown">❓ Bulunamadı</span>'
  };
  const badge=badges[s.status]||badges.pending;
  if(s.status==='pending'||s.status==='checking') return badge;
  let html=`<div class="result-box">${badge}`;
  if(s.currentVer) html+=`<div class="result-ver">Güncel versiyon: ${esc(s.currentVer)}</div>`;
  if(s.note) html+=`<div class="result-detail">${esc(s.note)}</div>`;
  if(s.history&&s.history.length>0){
    html+=`<div class="history-wrap"><div class="history-title">📅 Versiyon geçmişi (${s.history.length})</div><div class="history-timeline">`;
    s.history.forEach((ver,i)=>{
      const isLast=i===s.history.length-1;
      const isOurs=s.tarih&&ver.year&&(ver.year===s.tarih||ver.year.includes(s.tarih.substring(0,4)));
      const dc='history-dot'+(isLast?' latest':isOurs?' ours':'');
      const lc='history-label'+(isLast||isOurs?' bold':'');
      html+=`<div class="history-ver"><div class="history-dot-wrap"><div class="${dc}"></div>${!isLast?'<div class="history-line"></div>':''}</div><div class="${lc}">${esc(ver.year)}</div></div>`;
    });
    html+=`</div></div>`;
  }
  if(s.url) html+=`<a class="result-link" href="${esc(s.url)}" target="_blank">🔗 Kaynağa git</a>`;
  html+='</div>';
  return html;
}

function renderTable(){
  const filtered=standards.filter(s=>{
    if(activeFilter==='all') return true;
    if(activeFilter==='update') return s.status==='update';
    if(activeFilter==='current') return s.status==='current';
    if(activeFilter==='history') return s.history&&s.history.length>1;
    if(activeFilter==='pending') return s.status==='pending'||s.status==='checking';
    return true;
  });
  const body=document.getElementById('tableBody');
  if(!filtered.length){body.innerHTML=`<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text4)">Bu filtrede sonuç yok</td></tr>`;return;}
  body.innerHTML=filtered.map(s=>{
    const rc=s.status==='update'?'row-update':s.status==='current'?'row-current':'';
    return `<tr class="${rc}">
      <td><div class="std-code">${esc(s.no)}</div></td>
      <td><div class="std-name">${esc(s.name)}</div></td>
      <td style="font-size:12px;color:var(--text4)">${esc(s.tarih)}</td>
      <td>${buildResultHtml(s)}</td>
    </tr>`;
  }).join('');
}

function updateStats(){
  document.getElementById('statTotal').textContent=standards.length;
  document.getElementById('statUpdate').textContent=standards.filter(s=>s.status==='update').length;
  document.getElementById('statCurrent').textContent=standards.filter(s=>s.status==='current').length;
  document.getElementById('statHistory').textContent=standards.filter(s=>s.history&&s.history.length>1).length;
  document.getElementById('statPending').textContent=standards.filter(s=>s.status==='pending'||s.status==='checking').length;
}

async function startCheck(){
  if(running) return;
  running=true; shouldStop=false;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('progressLabel').style.display='block';
  const pending=standards.map((s,i)=>({...s,_idx:i})).filter(s=>s.status==='pending');
  let done=0;
  for(const s of pending){
    if(shouldStop){log(`<span class="warn">⏹ Durduruldu (${done}/${pending.length})</span>`);break;}
    standards[s._idx].status='checking'; renderTable(); updateStats();
    updateProgress(done,pending.length,s.no);
    try{
      const res=await fetch('/check_one',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,idx:s._idx})});
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      standards[s._idx]={...standards[s._idx],...data.standard};
      const icon=standards[s._idx].status==='current'?'✅':standards[s._idx].status==='update'?'⚠️':'❓';
      log(`${icon} ${s.no}${standards[s._idx].currentVer?' → '+standards[s._idx].currentVer:''}`);
    }catch(err){
      standards[s._idx].status='unknown';
      standards[s._idx].note='Hata: '+err.message;
      log(`<span class="err">✗</span> ${s.no} — ${err.message}`);
    }
    done++; updateProgress(done,pending.length,''); renderTable(); updateStats();
    if(done<pending.length&&!shouldStop) await sleep(1200);
  }
  running=false;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('stopBtn').disabled=true;
  document.getElementById('exportBtn').disabled=false;
  document.getElementById('progressLabel').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  const upd=standards.filter(s=>s.status==='update').length;
  const cur=standards.filter(s=>s.status==='current').length;
  log(`<span class="ok">✓ Tamamlandı</span> — ${upd} güncelleme · ${cur} güncel`);
  toast(`Tamamlandı: ${upd} güncelleme, ${cur} güncel`);
}

function stopCheck(){shouldStop=true;document.getElementById('stopBtn').disabled=true;}

function updateProgress(done,total,current){
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=current?`Kontrol ediliyor: ${current} (${done}/${total})`:`Tamamlandı: ${done}/${total}`;
}

async function exportExcel(){
  const res=await fetch('/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})});
  if(!res.ok){alert('Export hatası');return;}
  const blob=await res.blob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`standart_kontrol_${new Date().toISOString().slice(0,10)}.xlsx`;
  a.click(); toast('⬇️ Excel indirildi');
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderTable();
}

function resetAll(){
  if(!confirm('Sıfırlanacak. Emin misiniz?')) return;
  sessionId=null; standards=[];
  document.getElementById('contentArea').style.display='none';
  document.getElementById('logBox').innerHTML='';
  document.getElementById('mainArea').style.justifyContent='center';
  document.getElementById('mainArea').style.paddingTop='32px';
  const ua=document.getElementById('uploadArea');
  ua.classList.remove('loaded');
  ua.innerHTML=`<input type="file" id="fileInput" accept=".xlsx,.xls" onchange="uploadFile(event)" style="display:none"><h2>Excel dosyanızı buraya sürükleyin veya tıklayın</h2><p>.xlsx · .xls · Standart NO sütunu otomatik algılanır</p>`;
  ua.onclick=()=>document.getElementById('fileInput').click();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3500);}
function log(msg){const box=document.getElementById('logBox');box.innerHTML+=`<div>[${new Date().toLocaleTimeString('tr')}] ${msg}</div>`;box.scrollTop=box.scrollHeight;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
