<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Standart Denetleyici</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e5e5e3; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .logo { width: 40px; height: 40px; background: #1a1a18; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin: 0 auto 20px; }
  h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 6px; color: #1a1a18; }
  p { font-size: 13px; color: #888; text-align: center; margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #d1d1cf; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a1a18; margin-bottom: 14px; transition: border 0.15s; }
  input:focus { outline: none; border-color: #1a1a18; }
  button { width: 100%; padding: 11px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; margin-top: 4px; transition: background 0.15s; }
  button:hover { background: #333; }
  .error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📋</div>
  <h1>Standart Denetleyici</h1>
  <p>Devam etmek için giriş yapın</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Kullanıcı Adı</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Şifre</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Giriş Yap</button>
  </form>
</div>
</body>
</html>
